<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador de Usuarios - AJAX</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      font-size: 22px;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      background-color: #2ecc71;
      color: white;
      border: none;
      padding: 12px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s ease;
    }
    button:hover {
      background-color: #27ae60;
    }
    p {
      text-align: center;
      color: #7f8c8d;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Administrador de Usuarios</h1>
    <p>Abre la consola del navegador (F12) para ver las respuestas.</p>
    
    <div class="btn-group">
      <button onclick="admin.listarNombres()">1. Listar nombres de todos los usuarios</button>
      <button onclick="admin.infoBasicaPorPrompt()">2. Información básica por prompt (username y correo)</button>
      <button onclick="admin.direccionPorPrompt()">3. Dirección por prompt</button>
      <button onclick="admin.infoAvanzadaPorPrompt()">4. Información avanzada por prompt</button>
      <button onclick="admin.listarCompanias()">5. Listar compañías y catchphrases</button>
      <button onclick="admin.listarNombresOrdenados()">6. Listar nombres ordenados alfabéticamente</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
